    </select>
  </div>
  <div class="tweak-row">

    <input type="range" id="tw-radius" min="0" max="20" value="8" oninput="applyTweak('radius', this.value)">
  </div>
</div>

<script>
  window.__tweaks = { accent: '#6fd614', hero: 'dark', radius: 8 };
  function applyTweak(key, val) {
    window.__tweaks[key] = val;
    if (key === 'accent') document.documentElement.style.setProperty('--green', val);
    if (key === 'radius') document.documentElement.style.setProperty('--radius', val + 'px');
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
    if (window.__tweakRefresh) window.__tweakRefresh();
  }
  window.addEventListener('message', e => {
    if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('visible');
    if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('visible');
  });
  window.parent.postMessage({ type: '__edit_mode_available' }, '*');

  (function(){
    const PLACEHOLDER = 'data:image/svg+xml;utf8,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">' +
      '<defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a2f10"/><stop offset="55%" stop-color="#2a4818"/><stop offset="100%" stop-color="#0f1f08"/></linearGradient>' +
      '<pattern id="p" x="0" y="0" width="80" height="40" patternUnits="userSpaceOnUse"><rect width="80" height="40" fill="url(#g)"/><path d="M0 20 Q20 10 40 20 T80 20" stroke="#3a6520" stroke-width="0.8" fill="none" opacity="0.4"/><path d="M0 30 Q20 22 40 30 T80 30" stroke="#4f8a28" stroke-width="0.6" fill="none" opacity="0.35"/></pattern></defs>' +
      '<rect width="1200" height="800" fill="url(#p)"/><rect width="1200" height="800" fill="url(#g)" opacity="0.5"/>' +
      '<g opacity="0.08" fill="#6fd614"><rect x="0" y="120" width="1200" height="40"/><rect x="0" y="280" width="1200" height="40"/><rect x="0" y="440" width="1200" height="40"/><rect x="0" y="600" width="1200" height="40"/></g>' +
      '<text x="600" y="420" font-family="sans-serif" font-size="32" font-weight="800" fill="#6fd614" text-anchor="middle" opacity="0.18" letter-spacing="8">GAMS</text></svg>'
    );
    document.addEventListener('error', function(e){
      const t = e.target;
      if (t && t.tagName === 'IMG' && t.src !== PLACEHOLDER && !t.dataset.fallback) {
        t.dataset.fallback = '1';
        t.src = PLACEHOLDER;
      }
    }, true);
    const style = document.createElement('style');
    style.textContent = 'img{background:#1a2f10}';
    document.head.appendChild(style);
  })();
</script>

                </div>
              </div>
            </div>
          )}
          {step === 3 && (
            <div style={{ textAlign: 'center', padding: '20px 0' }}>
              <div style={{ fontSize: '64px', marginBottom: '20px' }}>✅</div>
              <h3 style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 900, fontSize: '32px', textTransform: 'uppercase', color: '#6fd614', marginBottom: '12px' }}>You're on the list!</h3>
              <p style={{ color: '#888', fontSize: '16px', lineHeight: 1.7, marginBottom: '24px' }}>
                Thanks {form.name.split(' ')[0] || 'there'}! We've received your quote request and will be in touch within 24 hours via {form.preferredContact}.
              </p>
              <p style={{ color: '#555', fontSize: '14px' }}>In the meantime, call us directly on <a href="tel:0422633941" style={{ color: '#6fd614', textDecoration: 'none' }}>0422 633 941</a></p>
              <button onClick={onClose} style={{
                marginTop: '28px', background: '#6fd614', color: '#0d0d0d', border: 'none',
                padding: '14px 40px', borderRadius: '6px', fontFamily: "'Barlow Condensed', sans-serif",
                fontWeight: 800, fontSize: '16px', textTransform: 'uppercase', letterSpacing: '1px', cursor: 'pointer',
              }}>Close</button>
            </div>
          )}
        </div>
        {step < 3 && (
          <div style={{ padding: '20px 32px', background: '#0d0d0d', borderTop: '1px solid #1e1e1e', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <button onClick={() => step > 0 ? setStep(s => s - 1) : onClose()} style={{ background: 'none', border: '1px solid #2a2a2a', color: '#888', padding: '12px 24px', borderRadius: '6px', cursor: 'pointer', fontFamily: "'Barlow Condensed', sans-serif", fontSize: '14px', textTransform: 'uppercase', letterSpacing: '1px' }}>
              {step === 0 ? 'Cancel' : 'Back'}
            </button>
            <button onClick={() => step < 2 ? setStep(s => s + 1) : handleSubmit()} style={{
              background: '#6fd614', color: '#0d0d0d', border: 'none',
              padding: '12px 36px', borderRadius: '6px', fontFamily: "'Barlow Condensed', sans-serif",
              fontWeight: 800, fontSize: '15px', letterSpacing: '1px', textTransform: 'uppercase', cursor: 'pointer',
            }}>
              {step < 2 ? 'Next' : 'Submit Quote Request'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [quoteOpen, setQuoteOpen] = useState(false);
  const [preService, setPreService] = useState(null);
  const openQuote = (serviceId = null) => {
    setPreService(serviceId);
    setQuoteOpen(true);
  };
  return (
    <>
      <Nav onQuote={() => openQuote()} />
      <Hero onQuote={() => openQuote()} />
      <Services onQuote={openQuote} />
      <Gallery />
      <About onQuote={() => openQuote()} />
      <CtaBanner onQuote={() => openQuote()} />
      <Footer />
      {quoteOpen && <QuoteModal onClose={() => setQuoteOpen(false)} preService={preService} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
